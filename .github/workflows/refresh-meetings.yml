name: Refresh Meetings JSON

# Fetches GCAL_ICAL_URL on a schedule and commits meetings.json so the web app
# can read it same-origin (no OAuth, no third-party cookies, no silent-refresh
# logout loop). See .github/scripts/refresh-meetings.mjs for details.

on:
  schedule:
    # Every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:

concurrency:
  group: refresh-meetings
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm install --omit=dev --no-audit --no-fund
      - name: Fetch iCal and write meetings.json
        env:
          GCAL_ICAL_URL: ${{ secrets.GCAL_ICAL_URL }}
          OUT_PATH: meetings.json
        run: node .github/scripts/refresh-meetings.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Only commit the events array — ignore generatedAt timestamp churn so
          # we don't spam the git history every 15 min when nothing changed.
          if [ -f meetings.json.prev ]; then rm meetings.json.prev; fi
          if git diff --quiet -- meetings.json; then
            echo "No changes to meetings.json"
            exit 0
          fi
          # If only generatedAt changed, skip commit
          CHANGED_LINES=$(git diff -U0 -- meetings.json | grep -E '^[+-]' | grep -v -E '^[+-]{3}' | grep -v -E '"generatedAt"' || true)
          if [ -z "$CHANGED_LINES" ]; then
            echo "Only generatedAt changed — skipping commit"
            git checkout -- meetings.json
            exit 0
          fi
          git add meetings.json
          git commit -m "chore: refresh meetings.json [skip ci]"
          git push
