<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1e4d"/>
      <stop offset="100%" stop-color="#1a1033"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff9e00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Sword -->
  <g filter="url(#glow)" transform="translate(256 256) rotate(-45) translate(-256 -256)">
    <rect x="240" y="90" width="32" height="270" rx="6" fill="url(#gold)"/>
    <polygon points="256,60 272,90 240,90" fill="url(#gold)"/>
    <rect x="200" y="345" width="112" height="18" rx="4" fill="#a78bfa"/>
    <rect x="248" y="355" width="16" height="70" rx="4" fill="#6b4fd4"/>
    <circle cx="256" cy="430" r="16" fill="#ffd700"/>
  </g>
  <!-- Star accents -->
  <text x="96" y="140" font-size="36" fill="#ffd700" opacity="0.6">✦</text>
  <text x="400" y="420" font-size="28" fill="#a78bfa" opacity="0.5">✦</text>
  <text x="420" y="120" font-size="20" fill="#ffd700" opacity="0.4">✦</text>
</svg>
